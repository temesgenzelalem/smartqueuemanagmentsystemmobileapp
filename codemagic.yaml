workflows:
  android-staff-app:
    name: Smart Queue Android (Staff)
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      flutter: stable
      vars:
        API_BASE_URL: "https://smartqueuemanagmentsystem-backend.onrender.com/api"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Inject API URL into bundled config
        script: |
          echo "API_BASE_URL=$API_BASE_URL" > assets/config.env
      - name: Get Flutter packages
        script: flutter pub get
      - name: Static analysis
        script: flutter analyze
      - name: Run tests
        script: flutter test
      - name: Build debug APK
        script: |
          flutter build apk --debug \
            --dart-define=API_BASE_URL=$API_BASE_URL
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
    publishing:
      email:
        recipients:
          - user@example.com
        notify:
          success: true
          failure: true
